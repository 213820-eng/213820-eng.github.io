<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@400,0,0" />
	<link rel="icon" href="./assets/img/cantsee.jpeg" type="image/png" />
	<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
    <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebar">
		<span></span>
		<span></span>
		<span></span>
	</button>

		<div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand">Lucas E Godoy</div>

            <div class="sidebar-hero">
                <img src="./assets/img/murisca.jpeg" alt="Foto de perfil da minha gata murisca deitada" />
            </div>

            <nav class="sidebar-nav" aria-label="Menu principal">
   				<a href="./index.html">Home</a>
    			<a href="./blog.html">Blog</a>
    			<a href="./curriculum.html">Currículo</a>
    			<a href="./about.html">Eu</a>
    			<a class="is-active" href="./contact.html">Contato</a>
    			<a href="./receitas.html">Receitas</a>
			</nav>

              <div class="sidebar-social" aria-label="Redes sociais">
                <a href="https://www.instagram.com/lucas_godoy._.18?igsh=MXF2MXFxdDJzcmxkcw==" target="_blank" rel="noopener noreferrer" aria-label="Meu Instagram">
                    <span class="material-symbols-outlined" aria-hidden="true">public</span>
                </a>
                <a href="https://213820-eng.github.io/" target="_blank" id="share-btn" aria-label="Copiar link do site">
                    <span class="material-symbols-outlined" aria-hidden="true">share</span>
                </a>
                
                <button class="theme-toggle-social" type="button" aria-label="Ativar tema Dracula" aria-pressed="false">
                    <span class="material-symbols-outlined theme-toggle-icon" aria-hidden="true">dark_mode</span>
                </button>
            </div>
        </aside>

        <div class="backdrop" hidden></div>

       <main class="content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; padding: 40px; box-sizing: border-box; font-family: sans-serif;">
            
            <header style="width: 100%; text-align: center; margin-bottom: 10px;">
                <h1 style="margin: 0; font-size: 32px; color: #111;">Formulário de contato</h1>
            </header>
            
           
            
            <section style="width: 100%; max-width: 320px;">
                <form id="contact-form" novalidate style="display: flex; flex-direction: column; align-items: center; width: 100%;">

                    <div style="margin-bottom: 20px; width: 100%; text-align: center;">
                        <label for="name" style="font-weight: bold; display: block; margin-bottom: 8px;">Nome:</label>
                        <input type="text" id="name" required minlength="3" maxlength="100" placeholder="Digite seu nome" name="name"
                               style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 14px;">
                        <span class="error-message" id="name-error" style="color: #c0392b; font-size: 12px; display: block; margin-top: 4px;"></span>
                    </div>

                    <div style="margin-bottom: 20px; width: 100%; text-align: center;">
                        <label for="email" style="font-weight: bold; display: block; margin-bottom: 8px;">Email:</label>
                        <input type="email" id="email" required placeholder="seuemail@email.com" name="email"
                               style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 14px;">
                        <span class="error-message" id="email-error" style="color: #c0392b; font-size: 12px; display: block; margin-top: 4px;"></span>
                    </div>

                    <div style="margin-bottom: 20px; width: 100%; text-align: center;">
                        <label for="telefone" style="font-weight: bold; display: block; margin-bottom: 8px;">Telefone:</label>
                        <input type="tel" id="telefone" name="telefone" required placeholder="(00) 00000-0000"
                               style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 14px;">
                        <span class="error-message" id="telefone-error" style="color: #c0392b; font-size: 12px; display: block; margin-top: 4px;"></span>
                    </div>

                    <div style="margin-bottom: 20px; width: 100%; text-align: center;">
                        <label for="mensagem" style="font-weight: bold; display: block; margin-bottom: 8px;">Mensagem:</label>
                        <textarea id="mensagem" name="mensagem" required minlength="10" rows="4" placeholder="Digite sua mensagem"
                               style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 14px; resize: vertical;"></textarea>
                        <span class="error-message" id="mensagem-error" style="color: #c0392b; font-size: 12px; display: block; margin-top: 4px;"></span>
                    </div>

                    <button type="submit" style="padding: 12px 40px; background-color: #1a1a1a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%;">
                        Enviar
                    </button>

                    <p id="form-success" style="color: #1a7a1a; font-size: 14px; display: none; margin-top: 15px;">
                        Mensagem enviada com sucesso!
                    </p>

                </form>
            </section>
        </main>
    </div>

    <button id="scrollToTop" class="scroll-to-top" aria-label="Voltar ao topo">
        <span class="material-symbols-outlined">arrow_upward</span>
    </button>
    
   <div class="fab-container" aria-label="Menu de Acessibilidade">
        <button class="fab-main" aria-label="Abrir opções">
            <img src="./assets/img/eye.jpg" alt="Olho de dragao" />
        </button>
        <div class="fab-options">
            <button id="decrease-font" class="fab-btn" aria-label="Diminuir fonte">
                <span class="material-symbols-outlined">text_decrease</span>
            </button>
            <button id="increase-font" class="fab-btn" aria-label="Aumentar fonte">
                <span class="material-symbols-outlined">text_increase</span>
            </button>
            <button id="toggle-theme-fab" class="fab-btn" aria-label="Alternar tema">
                <span class="material-symbols-outlined theme-toggle-icon-fab">dark_mode</span>
            </button>
        </div>
    </div>

   

        <script src="./js/main.js"></script>
</body>
</html>
